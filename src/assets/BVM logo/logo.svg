<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#C9922A" opacity="0.1" stroke="#C9922A" stroke-width="2"/>
  
  <!-- Shield shape -->
  <path d="M 60 20 L 90 35 L 90 65 Q 90 85 60 100 Q 30 85 30 65 L 30 35 Z" fill="none" stroke="#C9922A" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Teal accent inside shield -->
  <path d="M 60 28 L 82 40 L 82 65 Q 82 80 60 92 Q 38 80 38 65 L 38 40 Z" fill="#1A8C8C" opacity="0.15"/>
  
  <!-- Book symbol inside shield -->
  <g transform="translate(60, 60)">
    <!-- Left page -->
    <path d="M -8 -8 L -2 -8 L -2 8 L -8 8" fill="none" stroke="#C9922A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M 2 -8 L 8 -8 L 8 8 L 2 8" fill="none" stroke="#1A8C8C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Spine -->
    <line x1="-2" y1="-8" x2="-2" y2="8" stroke="#0B1F3A" stroke-width="1"/>
    <line x1="2" y1="-8" x2="2" y2="8" stroke="#0B1F3A" stroke-width="1"/>
    <!-- Lines on pages -->
    <line x1="-6" y1="-4" x2="-4" y2="-4" stroke="#C9922A" stroke-width="0.8"/>
    <line x1="-6" y1="-1" x2="-4" y2="-1" stroke="#C9922A" stroke-width="0.8"/>
    <line x1="-6" y1="2" x2="-4" y2="2" stroke="#C9922A" stroke-width="0.8"/>
    <line x1="4" y1="-4" x2="6" y2="-4" stroke="#1A8C8C" stroke-width="0.8"/>
    <line x1="4" y1="-1" x2="6" y2="-1" stroke="#1A8C8C" stroke-width="0.8"/>
    <line x1="4" y1="2" x2="6" y2="2" stroke="#1A8C8C" stroke-width="0.8"/>
  </g>
  
  <!-- Star accent at top -->
  <g transform="translate(60, 18)">
    <polygon points="0,-4 1,-1 4,-1 2,1 3,4 0,2 -3,4 -2,1 -4,-1 -1,-1" fill="#C9922A" opacity="0.8"/>
  </g>
</svg>
